<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Justin & Tyler Movie Awards: A Forensic Linguistic Investigation</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #faf7f2;
            --text: #1a1a1a;
            --accent: #c0392b;
            --accent2: #2c3e50;
            --accent3: #e67e22;
            --muted: #7f8c8d;
            --border: #ddd;
            --card-bg: #fff;
            --highlight: #ffeaa7;
            --justin: #c0392b;
            --tyler: #2980b9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

        header {
            text-align: center;
            padding: 80px 0 40px;
            border-bottom: 3px double var(--text);
            margin-bottom: 60px;
        }
        header .kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        header .subtitle {
            font-size: 20px;
            color: var(--muted);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            font-style: italic;
        }
        header .byline {
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .filter-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin-bottom: 40px;
        }
        .filter-bar .inner {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }
        .filter-bar select {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-bar .active-filter {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }
        .speaker-toggle {
            display: flex;
            gap: 4px;
        }
        .speaker-btn {
            padding: 5px 14px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .speaker-btn.active {
            color: #fff;
            border-color: transparent;
        }
        .speaker-btn[data-speaker="all"].active { background: var(--text); }
        .speaker-btn[data-speaker="Justin"].active { background: var(--justin); }
        .speaker-btn[data-speaker="Tyler"].active { background: var(--tyler); }

        .section { margin-bottom: 80px; }
        .section-header {
            border-top: 2px solid var(--text);
            padding-top: 8px;
            margin-bottom: 24px;
        }
        .section-header .section-kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 4px;
        }
        .section-header .section-sub {
            font-size: 16px;
            color: var(--muted);
            font-style: italic;
            margin-top: 4px;
        }

        .narrative {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 24px;
            max-width: 680px;
        }
        .narrative .highlight { background: var(--highlight); padding: 1px 4px; }
        .narrative strong { color: var(--accent); }

        .chart-container {
            margin: 32px 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            position: relative;
        }
        .chart-container .chart-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .chart-container .chart-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .chart-container .chart-source {
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 12px;
        }

        .big-numbers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }
        .big-number {
            text-align: center;
            padding: 24px 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .big-number .number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }
        .big-number .label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .records-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0;
        }
        .record-card {
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }
        .record-card .record-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .record-card .record-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
        }
        .record-card .record-detail {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Speaker comparison */
        .speaker-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 32px 0;
        }
        .speaker-card {
            padding: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-top: 4px solid var(--muted);
        }
        .speaker-card.justin { border-top-color: var(--justin); }
        .speaker-card.tyler { border-top-color: var(--tyler); }
        .speaker-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .speaker-card .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .speaker-card .stat-row .stat-label { color: var(--muted); }
        .speaker-card .stat-row .stat-value { font-weight: 600; }

        svg text { font-family: 'Source Sans 3', sans-serif; }
        .axis text { font-size: 12px; fill: var(--muted); }
        .axis line, .axis path { stroke: var(--border); }

        .tooltip {
            position: absolute;
            background: var(--text);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 999;
            max-width: 300px;
        }
        .tooltip .tt-title { font-weight: 700; margin-bottom: 4px; }

        .word-cloud text { cursor: default; transition: opacity 0.2s; }
        .word-cloud text:hover { opacity: 0.7; }

        .pull-quote {
            border-left: 4px solid var(--accent);
            padding: 16px 24px;
            margin: 32px 0;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            color: var(--accent2);
        }
        .pull-quote .attribution {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-style: normal;
            color: var(--muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Castle the Rabbit section */
        .castle-section {
            background: linear-gradient(135deg, #faf7f2 0%, #f0ebe3 100%);
            border: 2px solid var(--accent2);
            padding: 32px;
            margin: 32px 0;
            position: relative;
        }
        .castle-section .castle-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .castle-section .castle-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent2);
            object-fit: cover;
            background: #ddd;
            flex-shrink: 0;
        }
        .castle-section .castle-img-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent2);
            background: var(--accent2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            flex-shrink: 0;
        }
        .castle-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0;
        }
        .castle-stat {
            text-align: center;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }
        .castle-stat .cs-number {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--accent2);
        }
        .castle-stat .cs-label {
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .castle-quotes {
            margin-top: 20px;
        }
        .castle-quote {
            background: var(--card-bg);
            border-left: 3px solid var(--accent2);
            padding: 10px 16px;
            margin: 8px 0;
            font-size: 14px;
            font-style: italic;
            color: #555;
        }
        .castle-quote .cq-time {
            font-style: normal;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .no-speaker-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 32px; }
            .section-header h2 { font-size: 24px; }
            .records-grid, .speaker-comparison { grid-template-columns: 1fr; }
            .big-numbers { grid-template-columns: repeat(2, 1fr); }
        }

        .loading {
            text-align: center;
            padding: 80px 0;
            font-size: 18px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="kicker">A Forensic Linguistic Investigation</div>
        <h1>The Justin & Tyler<br>Movie Awards</h1>
        <div class="subtitle">We analyzed every word from 124 videos so you don't have to. Here's what we found when we put their mouths under the microscope.</div>
        <div class="byline">Data analysis performed on transcripts spanning 2011 &ndash; 2025</div>
    </header>
</div>

<div class="filter-bar">
    <div class="container">
        <div class="inner">
            <label>Year:</label>
            <select id="filter-year"><option value="all">All Years</option></select>
            <label>Video:</label>
            <select id="filter-video"><option value="all">All Videos</option></select>
            <label>Speaker:</label>
            <div class="speaker-toggle" id="speaker-toggle">
                <button class="speaker-btn active" data-speaker="all">Both</button>
                <button class="speaker-btn" data-speaker="Justin">Justin</button>
                <button class="speaker-btn" data-speaker="Tyler">Tyler</button>
            </div>
            <span class="active-filter" id="active-filter-label"></span>
        </div>
    </div>
</div>

<div class="container" id="main-content">
    <div class="loading">Loading data...</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
let DATA = null;
let currentYear = "all";
let currentVideo = "all";
let currentSpeaker = "all";

const tooltip = d3.select("#tooltip");
const fmt = d3.format(",");
const fmtDec = d3.format(",.1f");

function showTooltip(event, html) {
    tooltip.html(html).style("opacity", 1)
        .style("left", (event.pageX + 12) + "px")
        .style("top", (event.pageY - 12) + "px");
}
function hideTooltip() { tooltip.style("opacity", 0); }

function speakerColor(s) {
    return s === "Justin" ? "var(--justin)" : s === "Tyler" ? "var(--tyler)" : "var(--accent2)";
}

d3.json("data.json").then(data => {
    DATA = data;
    initFilters();
    render();
}).catch(err => {
    document.getElementById("main-content").innerHTML =
        `<div class="loading">Error loading data: ${err.message}</div>`;
});

function initFilters() {
    const yearSelect = d3.select("#filter-year");
    Object.keys(DATA.by_year).sort().forEach(y => {
        yearSelect.append("option").attr("value", y).text(y);
    });
    yearSelect.on("change", function() {
        currentYear = this.value;
        currentVideo = "all";
        updateVideoFilter();
        render();
    });

    d3.select("#filter-video").on("change", function() {
        currentVideo = this.value;
        render();
    });

    d3.selectAll(".speaker-btn").on("click", function() {
        d3.selectAll(".speaker-btn").classed("active", false);
        d3.select(this).classed("active", true);
        currentSpeaker = this.dataset.speaker;
        render();
    });

    updateVideoFilter();
}

function updateVideoFilter() {
    const sel = d3.select("#filter-video");
    sel.selectAll("option").remove();
    sel.append("option").attr("value", "all").text("All Videos");
    getFilteredVideos().sort((a,b) => (a.title||"").localeCompare(b.title||"")).forEach(v => {
        sel.append("option").attr("value", v.video_id)
            .text(v.title.length > 55 ? v.title.slice(0,52)+"..." : v.title);
    });
}

function getFilteredVideos() {
    let videos = Object.values(DATA.videos);
    if (currentYear !== "all") videos = videos.filter(v => v.year == currentYear);
    return videos;
}

function getActiveVideos() {
    if (currentVideo !== "all") {
        const v = DATA.videos[currentVideo];
        return v ? [v] : [];
    }
    return getFilteredVideos();
}

// Aggregate word_frequency arrays across videos, optionally for a speaker
function aggWordFreq(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].word_frequency;
        } else if (speaker === "all" || !speaker) {
            data = v.word_frequency;
        } else return;
        if (!data) return;
        data.forEach(([word, count]) => { combined[word] = (combined[word]||0) + count; });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function aggFillers(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].filler_words;
        } else if (speaker === "all" || !speaker) {
            data = v.filler_words;
        } else return;
        if (!data) return;
        Object.entries(data).forEach(([w, d]) => {
            combined[w] = (combined[w]||0) + d.count;
        });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function aggSuperlatives(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].superlatives;
        } else if (speaker === "all" || !speaker) {
            data = v.superlatives;
        } else return;
        if (!data || !data.words) return;
        Object.entries(data.words).forEach(([w, d]) => {
            combined[w] = (combined[w]||0) + d.count;
        });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function hasSpeakerData(videos) {
    return videos.some(v => v.has_speaker_data);
}

function render() {
    const container = d3.select("#main-content");
    container.html("");
    const videos = getActiveVideos();
    const sp = currentSpeaker;
    const label = currentVideo !== "all"
        ? DATA.videos[currentVideo]?.title
        : currentYear !== "all" ? `${currentYear} Awards` : "All Years (2011-2025)";
    d3.select("#active-filter-label").text(
        (sp !== "all" ? sp + " - " : "") + label
    );

    if (!videos.length) {
        container.append("div").attr("class","loading").text("No data for this selection.");
        return;
    }

    if (sp !== "all" && !hasSpeakerData(videos)) {
        container.append("div").attr("class","no-speaker-note").html(
            `<strong>Speaker data not yet available.</strong> Run the diarization pipeline (<code>python diarize.py</code>) to enable per-speaker analysis. Showing combined data instead.`
        );
    }

    renderBigNumbers(container, videos, sp);
    renderNarrative(container, videos, sp);
    if (sp === "all" && DATA.has_speaker_data) renderSpeakerComparison(container, videos);
    renderWordCloud(container, videos, sp);
    renderFillerWordsChart(container, videos, sp);
    renderSuperlativeChart(container, videos, sp);
    if (currentVideo === "all") renderVocabularyEvolution(container, sp);
    if (videos.length === 1) renderEnergyTimeline(container, videos[0]);
    renderHarmonyMeter(container, videos);
    renderHotTakes(container, videos, sp);
    renderCastle(container, videos);
    if (currentVideo === "all") renderRecords(container);
    if (currentVideo === "all") renderFillerEvolution(container, sp);
    renderFooter(container);
}

function renderBigNumbers(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    let totalWords = 0, totalMin = 0, totalFillers = 0, totalSups = 0;

    videos.forEach(v => {
        if (speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            const sp = v.by_speaker[speaker];
            totalWords += sp.vocabulary?.total_words || 0;
            totalMin += (sp.speaking_time_seconds || 0) / 60;
            totalFillers += Object.values(sp.filler_words || {}).reduce((s,f) => s + f.count, 0);
            totalSups += sp.superlatives?.total || 0;
        } else {
            totalWords += v.vocabulary?.total_words || 0;
            totalMin += v.duration_min || 0;
            totalFillers += Object.values(v.filler_words || {}).reduce((s,f) => s + f.count, 0);
            totalSups += v.superlatives?.total || 0;
        }
    });
    const avgWpm = totalMin > 0 ? Math.round(totalWords / totalMin) : 0;

    const nums = section.append("div").attr("class","big-numbers");
    [[fmt(videos.length), "Videos"],
     [fmt(totalWords), "Words Spoken"],
     [fmtDec(totalMin / 60), "Hours"],
     [fmt(avgWpm), "Avg Words/Min"],
     [fmt(totalFillers), "Filler Words"],
     [fmt(totalSups), "Superlatives"]
    ].forEach(([num, lbl]) => {
        const card = nums.append("div").attr("class","big-number");
        card.append("div").attr("class","number").text(num);
        card.append("div").attr("class","label").text(lbl);
    });
}

function renderNarrative(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    let totalWords = 0, totalMin = 0;
    const fillerAgg = {};
    videos.forEach(v => {
        const src = (speaker !== "all" && v.by_speaker?.[speaker]) || v;
        totalWords += src.vocabulary?.total_words || 0;
        totalMin += (src.speaking_time_seconds ? src.speaking_time_seconds/60 : v.duration_min) || 0;
        const fw = src.filler_words || {};
        Object.entries(fw).forEach(([w,d]) => { fillerAgg[w] = (fillerAgg[w]||0) + d.count; });
    });
    const totalFillers = Object.values(fillerAgg).reduce((s,c) => s+c, 0);
    const fillerPct = totalWords > 0 ? (totalFillers / totalWords * 100).toFixed(1) : 0;
    const topFiller = Object.entries(fillerAgg).sort((a,b) => b[1]-a[1])[0];
    const who = speaker !== "all" ? speaker : "Justin and Tyler";
    const novels = Math.round(totalWords / 80000);

    section.append("div").attr("class","narrative").html(
        `Over <strong>${fmt(videos.length)} videos</strong> and ` +
        `<strong>${fmtDec(totalMin)} minutes</strong>, ${who} spoke ` +
        `approximately <strong>${fmt(totalWords)} words</strong> about movies. ` +
        `That's roughly ${novels} novel${novels !== 1 ? 's' : ''}. ` +
        (topFiller ? `Favorite verbal crutch? <span class="highlight">"${topFiller[0]}"</span>, ` +
        `uttered <strong>${fmt(topFiller[1])} times</strong>. ` : '') +
        `About <strong>${fillerPct}%</strong> of everything is filler.`
    );
}

function renderSpeakerComparison(container, videos) {
    if (!DATA.by_speaker || !Object.keys(DATA.by_speaker).length) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Head to Head");
    header.append("h2").text("Justin vs. Tyler: The Tale of the Tape");
    header.append("div").attr("class","section-sub").text("Who talks more? Who uses bigger words? Who can't stop saying 'amazing'?");

    const grid = section.append("div").attr("class","speaker-comparison");

    ["Justin", "Tyler"].forEach(name => {
        const stats = DATA.by_speaker[name];
        if (!stats) return;
        const card = grid.append("div").attr("class", `speaker-card ${name.toLowerCase()}`);
        card.append("h3").text(name);

        const rows = [
            ["Total Words", fmt(stats.total_words)],
            ["Speaking Time", fmtDec(stats.total_speaking_time_min) + " min"],
            ["Words/Minute", fmtDec(stats.words_per_minute)],
            ["Unique Words", fmt(stats.unique_words)],
            ["Vocabulary (TTR)", stats.ttr],

function renderWordCloud(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Lexical Obsessions");
    header.append("h2").text(speaker !== "all" ? `What ${speaker} Can't Stop Saying` : "What They Can't Stop Talking About");
    header.append("div").attr("class","section-sub").text("Most frequently used words, stop words removed. Size = frequency.");

    const wordData = aggWordFreq(videos, speaker).slice(0, 60);
    if (!wordData.length) return;

    const chart = section.append("div").attr("class","chart-container");
    const width = 900, height = 400;
    const svg = chart.append("svg").attr("viewBox",`0 0 ${width} ${height}`).attr("class","word-cloud");

    const maxCount = wordData[0][1];
    const fontSize = d3.scaleSqrt().domain([wordData[wordData.length-1][1], maxCount]).range([10, 52]);
    const color = d3.scaleOrdinal().range(["#c0392b","#2c3e50","#e67e22","#27ae60","#8e44ad","#2980b9","#d35400"]);
    const cx = width/2, cy = height/2;

    wordData.forEach(([word, count], i) => {
        const size = fontSize(count);
        const angle = i * 0.7;
        const radius = Math.sqrt(i) * 28;
        let x = Math.max(size*2, Math.min(width-size*2, cx + radius*Math.cos(angle)));
        let y = Math.max(size, Math.min(height-size/2, cy + radius*Math.sin(angle)));

        svg.append("text").attr("x",x).attr("y",y).attr("text-anchor","middle")
            .attr("font-size",size+"px").attr("font-weight",size>30?700:400)
            .attr("fill",color(i%7)).attr("opacity",0.85).text(word)
            .on("mouseover", function(event) {
                showTooltip(event, `<div class="tt-title">"${word}"</div>Used ${fmt(count)} times`);
                d3.select(this).attr("opacity",1);
            })
            .on("mouseout", function() { hideTooltip(); d3.select(this).attr("opacity",0.85); });
    });
    chart.append("div").attr("class","chart-source").text("Source: YouTube auto-generated transcripts");
}

    svg.append("path").datum(years)
        .attr("d",d3.line().x(d=>x(d.year)).y(d=>y2(d.words_per_minute)).curve(d3.curveMonotoneX))
        .attr("fill","none").attr("stroke","#2980b9").attr("stroke-width",2.5).attr("stroke-dasharray","5,3");

        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>TTR: ${d.ttr}<br>WPM: ${d.words_per_minute}`))

        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>WPM: ${d.words_per_minute}<br>TTR: ${d.ttr}`))
        .on("mouseout",hideTooltip);

    svg.append("g").call(d3.axisLeft(y).ticks(5)).append("text").attr("fill","#c0392b").attr("y",-10).attr("font-size","11px").text("TTR");
    svg.append("g").attr("transform",`translate(${width},0)`).call(d3.axisRight(y2).ticks(5))
        .append("text").attr("fill","#2980b9").attr("y",-10).attr("font-size","11px").text("WPM");

    const legend = svg.append("g").attr("transform",`translate(${width-200},10)`);
    legend.append("line").attr("x1",0).attr("x2",20).attr("y1",0).attr("y2",0).attr("stroke","#c0392b").attr("stroke-width",2.5);
    legend.append("text").attr("x",25).attr("y",4).attr("font-size","12px").text("Vocabulary Richness (TTR)");

    legend.append("text").attr("x",25).attr("y",24).attr("font-size","12px").text("Words Per Minute");

function renderHarmonyMeter(container, videos) {
    const section = container.append("div").attr("class","section");

        `For every disagreement, they agree <strong>${ratio} times</strong>. ` +
        `Out of <strong>${fmt(total)}</strong> opinion exchanges, ` +

        (parseFloat(ratio) > 3 ? "They're a hive mind with two mouths." :
         parseFloat(ratio) < 1.5 ? "They should see a couples therapist." :
         "Healthy tension. They push back just enough.")
    );

    const chart = section.append("div").attr("class","chart-container");
    const svg = chart.append("svg").attr("viewBox","0 0 900 80");

    svg.append("text").attr("x",30).attr("y",45).attr("fill","#fff").attr("font-weight","700").attr("font-size","14px").text(`Agree: ${(pct*100).toFixed(0)}%`);

    const x = d3.scaleLinear().domain(d3.extent(years,d=>d.year)).range([0,width]);
    const yF = d3.scaleLinear().domain([0,d3.max(years,d=>d.filler_per_minute)*1.2]).range([height,0]);
    const yS = d3.scaleLinear().domain([0,d3.max(years,d=>d.superlative_per_minute)*1.2]).range([height,0]);

    svg.append("path").datum(years)
        .attr("d",d3.area().x(d=>x(d.year)).y0(height).y1(d=>yF(d.filler_per_minute)).curve(d3.curveMonotoneX))
        .attr("fill","#c0392b").attr("opacity",0.15);
    svg.append("path").datum(years)
        .attr("d",d3.line().x(d=>x(d.year)).y(d=>yF(d.filler_per_minute)).curve(d3.curveMonotoneX))
        .attr("fill","none").attr("stroke","#c0392b").attr("stroke-width",2.5);
    svg.append("path").datum(years)
        .attr("d",d3.line().x(d=>x(d.year)).y(d=>yS(d.superlative_per_minute)).curve(d3.curveMonotoneX))
        .attr("fill","none").attr("stroke","#e67e22").attr("stroke-width",2.5).attr("stroke-dasharray","5,3");

    svg.selectAll(".df").data(years).join("circle")
        .attr("cx",d=>x(d.year)).attr("cy",d=>yF(d.filler_per_minute)).attr("r",4).attr("fill","#c0392b")
        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>Fillers/min: ${d.filler_per_minute}<br>Superlatives/min: ${d.superlative_per_minute}`))
        .on("mouseout",hideTooltip);
    svg.selectAll(".ds").data(years).join("circle")
        .attr("cx",d=>x(d.year)).attr("cy",d=>yS(d.superlative_per_minute)).attr("r",4).attr("fill","#e67e22")
        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>Superlatives/min: ${d.superlative_per_minute}`))
        .on("mouseout",hideTooltip);

    svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).ticks(years.length).tickFormat(d3.format("d")));
    svg.append("g").call(d3.axisLeft(yF).ticks(5)).append("text").attr("fill","#c0392b").attr("y",-10).text("Fillers/min");
    svg.append("g").attr("transform",`translate(${width},0)`).call(d3.axisRight(yS).ticks(5))
        .append("text").attr("fill","#e67e22").attr("y",-10).text("Superlatives/min");

    const legend = svg.append("g").attr("transform",`translate(${width-220},10)`);
    legend.append("line").attr("x1",0).attr("x2",20).attr("y1",0).attr("y2",0).attr("stroke","#c0392b").attr("stroke-width",2.5);
    legend.append("text").attr("x",25).attr("y",4).attr("font-size","12px").text("Filler Words / Minute");
    legend.append("line").attr("x1",0).attr("x2",20).attr("y1",20).attr("y2",20).attr("stroke","#e67e22").attr("stroke-width",2.5).attr("stroke-dasharray","5,3");
    legend.append("text").attr("x",25).attr("y",24).attr("font-size","12px").text("Superlatives / Minute");
}

function renderCastle(container, videos) {
    // Aggregate Castle mentions across selected videos
    let totalMentions = 0, awardMentions = 0, movieMentions = 0, rabbitMentions = 0;
    const allContexts = [];
    const byYear = {};

    videos.forEach(v => {
        const c = v.castle;
        if (!c) return;
        totalMentions += c.total_mentions || 0;
        awardMentions += c.castle_award_mentions || 0;
        movieMentions += c.movie_castle_mentions || 0;
        rabbitMentions += c.rabbit_mentions || 0;
        (c.contexts || []).forEach(ctx => {
            allContexts.push({...ctx, video: v.title, year: v.year});
        });
    });

    // Also pull from global castle stats if showing all videos
    const globalCastle = DATA.castle || {};
    if (currentVideo === "all" && currentYear === "all") {
        // Use global stats which cover all videos (including those still loading)
        if (globalCastle.total_mentions > totalMentions) {
            totalMentions = globalCastle.total_mentions;
            awardMentions = globalCastle.castle_award_mentions || awardMentions;
        }
    }

    if (totalMentions === 0 && !globalCastle.total_mentions) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("The Unofficial Mascot");
    header.append("h2").text("Castle the Rabbit: A Star Is Born");
    header.append("div").attr("class","section-sub").text("Tyler's rabbit, named after Frank Castle (The Punisher). Yes, really. A rabbit named after a vigilante.");

    // Castle hero section
    const castleBox = section.append("div").attr("class","castle-section");
    const castleHeader = castleBox.append("div").attr("class","castle-header");

    // Image placeholder (will be replaced when image is provided)
    const imgEl = castleHeader.append("img")
        .attr("class","castle-img")
        .attr("id","castle-img")
        .attr("src","castle.jpg")
        .attr("alt","Castle the Rabbit")
        .on("error", function() {
            // If image doesn't exist, show placeholder
            d3.select(this).remove();
            castleHeader.insert("div", ":first-child")
                .attr("class","castle-img-placeholder")
                .text("C");
        });

    const castleText = castleHeader.append("div");
    castleText.append("div").style("font-family","'Playfair Display', serif")
        .style("font-size","22px").style("font-weight","700")
        .text("Castle");
    castleText.append("div").style("font-size","14px").style("color","var(--muted)")
        .style("margin-top","4px")
        .html('Species: Rabbit | Namesake: Frank Castle (The Punisher) | Role: Tyler\'s Co-Host & Moral Support');

    // Commentary
    const mentionRate = videos.length > 0 ? (totalMentions / videos.length).toFixed(1) : 0;
    const commentary = totalMentions > 20
        ? `Castle has achieved something most human actors never will: being mentioned <strong>${fmt(totalMentions)} times</strong> across a movie awards show without ever appearing on screen (as far as we know). At <strong>${mentionRate} mentions per video</strong>, Castle has more screen presence than some of the movies being reviewed. The show has even created a <strong>"Castle Award"</strong> in his honor, referenced <strong>${fmt(awardMentions)} times</strong>. We're starting to think this isn't a movie awards show at all &mdash; it's a rabbit fan channel that occasionally discusses cinema.`
        : totalMentions > 5
        ? `Castle has been name-dropped <strong>${fmt(totalMentions)} times</strong>, averaging <strong>${mentionRate} per video</strong>. For a rabbit who has never directed, produced, or starred in a single film, that's a remarkable level of industry relevance. They even created a <strong>"Castle Award"</strong> category &mdash; an accolade most Hollywood executives would kill for.`
        : totalMentions > 0
        ? `Castle has made <strong>${fmt(totalMentions)} cameo${totalMentions > 1 ? 's' : ''}</strong> in the transcript. Not bad for someone who spends most of his time eating hay. Every journey starts with a single hop.`
        : `Castle's presence is felt even when not spoken. The rabbit watches. The rabbit waits.`;

    castleBox.append("div").attr("class","narrative").style("margin-top","16px").html(commentary);

    // Stats grid
    const stats = castleBox.append("div").attr("class","castle-stats-grid");
    [[fmt(totalMentions), "Total Mentions"],
     [fmt(awardMentions), "Castle Award Refs"],
     [mentionRate, "Per Video Avg"]
    ].forEach(([num, lbl]) => {
        const s = stats.append("div").attr("class","castle-stat");
        s.append("div").attr("class","cs-number").text(num);
        s.append("div").attr("class","cs-label").text(lbl);
    });

    // Castle mentions by year chart (if aggregate view)
    const yearData = globalCastle.by_year || byYear;
    const yearEntries = Object.entries(yearData).filter(([,v]) => v > 0).sort((a,b) => a[0]-b[0]);
    if (yearEntries.length > 1 && currentVideo === "all") {
        const chart = castleBox.append("div").style("margin-top","20px")
            .style("background","var(--card-bg)").style("padding","16px").style("border","1px solid var(--border)");
        chart.append("div").style("font-family","'Playfair Display', serif")
            .style("font-size","16px").style("font-weight","700").style("margin-bottom","12px")
            .text("Castle's Rising Influence");

        const margin = {top:10,right:20,bottom:30,left:40};
        const w = 840-margin.left-margin.right, h = 160-margin.top-margin.bottom;
        const svg = chart.append("svg")
            .attr("viewBox",`0 0 ${w+margin.left+margin.right} ${h+margin.top+margin.bottom}`)
            .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

        const x = d3.scaleBand().domain(yearEntries.map(d=>d[0])).range([0,w]).padding(0.3);
        const y = d3.scaleLinear().domain([0,d3.max(yearEntries,d=>d[1])*1.2]).range([h,0]);

        svg.selectAll("rect").data(yearEntries).join("rect")
            .attr("x",d=>x(d[0])).attr("y",d=>y(d[1])).attr("width",x.bandwidth()).attr("height",d=>h-y(d[1]))
            .attr("fill","var(--accent2)").attr("opacity",0.8)
            .on("mouseover",function(event,d){showTooltip(event,`<div class="tt-title">${d[0]}</div>${d[1]} Castle mentions`);d3.select(this).attr("opacity",1);})
            .on("mouseout",function(){hideTooltip();d3.select(this).attr("opacity",0.8);});

        svg.selectAll(".bar-label").data(yearEntries).join("text")
            .attr("x",d=>x(d[0])+x.bandwidth()/2).attr("y",d=>y(d[1])-4)
            .attr("text-anchor","middle").attr("font-size","12px").attr("font-weight","600")
            .attr("fill","var(--accent2)").text(d=>d[1]);

        svg.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x)).select(".domain").remove();
    }

    // Show actual transcript quotes
    if (allContexts.length > 0) {
        const quotes = castleBox.append("div").attr("class","castle-quotes");
        quotes.append("div").style("font-family","'JetBrains Mono', monospace")
            .style("font-size","11px").style("text-transform","uppercase")
            .style("letter-spacing","1.5px").style("color","var(--muted)")
            .style("margin-bottom","8px").text("Actual things said about/near Castle");
        allContexts.slice(0, 6).forEach(ctx => {
            const q = quotes.append("div").attr("class","castle-quote");
            const mins = Math.floor(ctx.time / 60);
            const secs = Math.floor(ctx.time % 60);
            q.html(`"${ctx.text}" <span class="cq-time">&mdash; ${ctx.video.slice(0,50)}, ${mins}:${String(secs).padStart(2,'0')}</span>`);
        });
    }
}

function renderFooter(container) {
    const section = container.append("div").attr("class","section")
        .style("border-top","2px solid #1a1a1a").style("padding-top","24px").style("margin-bottom","80px");
    section.append("div").attr("class","narrative").html(
        `<strong>Methodology:</strong> Transcripts from YouTube auto-generated captions via YouTube Transcript API. ` +
        `Word analysis uses NLTK (English stop words removed). Speaker diarization via pyannote.audio ` +
        `(when available). Filler words, superlatives, and opinion markers use keyword matching against curated lists. ` +
        `<br><br>Caveats: Auto-generated transcripts aren't perfect. Sarcasm detection remains impossible for machines. ` +
        `Speaker attribution depends on diarization quality. This analysis should be taken with approximately zero seriousness.`
    );
    section.append("div").style("font-size","12px").style("color","#999")
        .style("font-family","JetBrains Mono, monospace").style("margin-top","16px")
        .html(`Generated ${new Date().toLocaleDateString()} | Data: @BridgewatersFinest | ` +
              `${DATA.diarized_videos || 0}/${DATA.total_videos} videos with speaker data`);
}
