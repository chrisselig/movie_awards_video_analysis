<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Justin & Tyler Movie Awards: A Forensic Linguistic Investigation</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #faf7f2;
            --text: #1a1a1a;
            --accent: #c0392b;
            --accent2: #2c3e50;
            --accent3: #e67e22;
            --muted: #7f8c8d;
            --border: #ddd;
            --card-bg: #fff;
            --highlight: #ffeaa7;
            --justin: #c0392b;
            --tyler: #2980b9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

        header {
            text-align: center;
            padding: 80px 0 40px;
            border-bottom: 3px double var(--text);
            margin-bottom: 60px;
        }
        header .kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        header .subtitle {
            font-size: 20px;
            color: var(--muted);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            font-style: italic;
        }
        header .byline {
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .filter-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin-bottom: 40px;
        }
        .filter-bar .inner {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }
        .filter-bar select {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-bar .active-filter {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }
        .speaker-toggle {
            display: flex;
            gap: 4px;
        }
        .speaker-btn {
            padding: 5px 14px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .speaker-btn.active {
            color: #fff;
            border-color: transparent;
        }
        .speaker-btn[data-speaker="all"].active { background: var(--text); }
        .speaker-btn[data-speaker="Justin"].active { background: var(--justin); }
        .speaker-btn[data-speaker="Tyler"].active { background: var(--tyler); }

        .section { margin-bottom: 80px; }
        .section-header {
            border-top: 2px solid var(--text);
            padding-top: 8px;
            margin-bottom: 24px;
        }
        .section-header .section-kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 4px;
        }
        .section-header .section-sub {
            font-size: 16px;
            color: var(--muted);
            font-style: italic;
            margin-top: 4px;
        }

        .narrative {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 24px;
            max-width: 680px;
        }
        .narrative .highlight { background: var(--highlight); padding: 1px 4px; }
        .narrative strong { color: var(--accent); }

        .chart-container {
            margin: 32px 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            position: relative;
        }
        .chart-container .chart-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .chart-container .chart-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .chart-container .chart-source {
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 12px;
        }

        .big-numbers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }
        .big-number {
            text-align: center;
            padding: 24px 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .big-number .number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }
        .big-number .label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .records-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0;
        }
        .record-card {
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }
        .record-card .record-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .record-card .record-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
        }
        .record-card .record-detail {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Speaker comparison */
        .speaker-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 32px 0;
        }
        .speaker-card {
            padding: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-top: 4px solid var(--muted);
        }
        .speaker-card.justin { border-top-color: var(--justin); }
        .speaker-card.tyler { border-top-color: var(--tyler); }
        .speaker-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .speaker-card .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .speaker-card .stat-row .stat-label { color: var(--muted); }
        .speaker-card .stat-row .stat-value { font-weight: 600; }

        svg text { font-family: 'Source Sans 3', sans-serif; }
        .axis text { font-size: 12px; fill: var(--muted); }
        .axis line, .axis path { stroke: var(--border); }

        .tooltip {
            position: absolute;
            background: var(--text);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 999;
            max-width: 300px;
        }
        .tooltip .tt-title { font-weight: 700; margin-bottom: 4px; }

        .word-cloud text { cursor: default; transition: opacity 0.2s; }
        .word-cloud text:hover { opacity: 0.7; }

        .pull-quote {
            border-left: 4px solid var(--accent);
            padding: 16px 24px;
            margin: 32px 0;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            color: var(--accent2);
        }
        .pull-quote .attribution {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-style: normal;
            color: var(--muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Castle the Rabbit section */
        .castle-section {
            background: linear-gradient(135deg, #faf7f2 0%, #f0ebe3 100%);
            border: 2px solid var(--accent2);
            padding: 32px;
            margin: 32px 0;
            position: relative;
        }
        .castle-section .castle-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .castle-section .castle-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent2);
            object-fit: cover;
            background: #ddd;
            flex-shrink: 0;
        }
        .castle-section .castle-img-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent2);
            background: var(--accent2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            flex-shrink: 0;
        }
        .castle-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0;
        }
        .castle-stat {
            text-align: center;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }
        .castle-stat .cs-number {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--accent2);
        }
        .castle-stat .cs-label {
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .castle-quotes {
            margin-top: 20px;
        }
        .castle-quote {
            background: var(--card-bg);
            border-left: 3px solid var(--accent2);
            padding: 10px 16px;
            margin: 8px 0;
            font-size: 14px;
            font-style: italic;
            color: #555;
        }
        .castle-quote .cq-time {
            font-style: normal;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* Sentiment section */
        .sentiment-callout {
            display: flex;
            gap: 16px;
            margin: 16px 0;
        }
        .sentiment-callout .sc-card {
            flex: 1;
            padding: 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .sentiment-callout .sc-card.positive { border-left: 4px solid #27ae60; }
        .sentiment-callout .sc-card.negative { border-left: 4px solid #c0392b; }
        .sentiment-callout .sc-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .sentiment-callout .sc-quote {
            font-style: italic;
            font-size: 14px;
            color: #333;
        }
        .sentiment-callout .sc-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        /* Rant section */
        .rant-leaderboard { margin: 24px 0; }
        .rant-entry {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            margin-bottom: 12px;
        }
        .rant-entry .rant-rank {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            min-width: 40px;
            text-align: center;
        }
        .rant-entry .rant-body { flex: 1; }
        .rant-entry .rant-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .rant-entry .rant-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .rant-entry .rant-quote {
            font-style: italic;
            font-size: 13px;
            color: #555;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }
        .rant-score-bar {
            width: 80px;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        .rant-score-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
        }

        /* Markov section */
        .markov-card {
            background: var(--card-bg);
            border: 2px solid var(--accent2);
            padding: 40px;
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .markov-card .markov-quote {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-style: italic;
            color: var(--accent2);
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .markov-card .markov-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: var(--accent2);
            color: #fff;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .markov-card .markov-btn:hover { background: #1a252f; }

        /* TF-IDF section */
        .tfidf-year-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .tfidf-year-row .tfidf-year {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            min-width: 50px;
            color: var(--accent2);
        }
        .tfidf-year-row .tfidf-words {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tfidf-word-tag {
            display: inline-block;
            padding: 3px 8px;
            background: #ecf0f1;
            border-radius: 3px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Castle predictor */
        .predictor-coeff-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        .predictor-coeff-bar .pcb-label {
            min-width: 130px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-align: right;
        }
        .predictor-coeff-bar .pcb-bar {
            flex: 1;
            height: 20px;
            position: relative;
            background: #f5f5f5;
        }
        .predictor-coeff-bar .pcb-fill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 2px;
        }

        .no-speaker-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 32px; }
            .section-header h2 { font-size: 24px; }
            .records-grid, .speaker-comparison { grid-template-columns: 1fr; }
            .big-numbers { grid-template-columns: repeat(2, 1fr); }
        }

        .loading {
            text-align: center;
            padding: 80px 0;
            font-size: 18px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="kicker">A Forensic Linguistic Investigation</div>
        <h1>The Justin & Tyler<br>Movie Awards</h1>
        <div class="subtitle">We analyzed every word from 124 videos so you don't have to. Here's what we found when we put their mouths under the microscope.</div>
        <div class="byline">Data analysis performed on transcripts spanning 2011 &ndash; 2025</div>
    </header>
</div>

<div class="filter-bar">
    <div class="container">
        <div class="inner">
            <label>Year:</label>
            <select id="filter-year"><option value="all">All Years</option></select>
            <label>Video:</label>
            <select id="filter-video"><option value="all">All Videos</option></select>
            <label>Speaker:</label>
            <div class="speaker-toggle" id="speaker-toggle">
                <button class="speaker-btn active" data-speaker="all">Both</button>
                <button class="speaker-btn" data-speaker="Justin">Justin</button>
                <button class="speaker-btn" data-speaker="Tyler">Tyler</button>
            </div>
            <span class="active-filter" id="active-filter-label"></span>
        </div>
    </div>
</div>

<div class="container" id="main-content">
    <div class="loading">Loading data...</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
let DATA = null;
let currentYear = "all";
let currentVideo = "all";
let currentSpeaker = "all";

const tooltip = d3.select("#tooltip");
const fmt = d3.format(",");
const fmtDec = d3.format(",.1f");

function showTooltip(event, html) {
    tooltip.html(html).style("opacity", 1)
        .style("left", (event.pageX + 12) + "px")
        .style("top", (event.pageY - 12) + "px");
}
function hideTooltip() { tooltip.style("opacity", 0); }

function speakerColor(s) {
    return s === "Justin" ? "var(--justin)" : s === "Tyler" ? "var(--tyler)" : "var(--accent2)";
}

d3.json("data.json").then(data => {
    DATA = data;
    initFilters();
    render();
}).catch(err => {
    document.getElementById("main-content").innerHTML =
        `<div class="loading">Error loading data: ${err.message}</div>`;
});

function initFilters() {
    const yearSelect = d3.select("#filter-year");
    Object.keys(DATA.by_year).sort().forEach(y => {
        yearSelect.append("option").attr("value", y).text(y);
    });
    yearSelect.on("change", function() {
        currentYear = this.value;
        currentVideo = "all";
        updateVideoFilter();
        render();
    });

    d3.select("#filter-video").on("change", function() {
        currentVideo = this.value;
        render();
    });

    d3.selectAll(".speaker-btn").on("click", function() {
        d3.selectAll(".speaker-btn").classed("active", false);
        d3.select(this).classed("active", true);
        currentSpeaker = this.dataset.speaker;
        render();
    });

    updateVideoFilter();
}

function updateVideoFilter() {
    const sel = d3.select("#filter-video");
    sel.selectAll("option").remove();
    sel.append("option").attr("value", "all").text("All Videos");
    getFilteredVideos().sort((a,b) => (a.title||"").localeCompare(b.title||"")).forEach(v => {
        sel.append("option").attr("value", v.video_id)
            .text(v.title.length > 55 ? v.title.slice(0,52)+"..." : v.title);
    });
}

function getFilteredVideos() {
    let videos = Object.values(DATA.videos);
    if (currentYear !== "all") videos = videos.filter(v => v.year == currentYear);
    return videos;
}

function getActiveVideos() {
    if (currentVideo !== "all") {
        const v = DATA.videos[currentVideo];
        return v ? [v] : [];
    }
    return getFilteredVideos();
}

// Aggregate word_frequency arrays across videos, optionally for a speaker
function aggWordFreq(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].word_frequency;
        } else if (speaker === "all" || !speaker) {
            data = v.word_frequency;
        } else return;
        if (!data) return;
        data.forEach(([word, count]) => { combined[word] = (combined[word]||0) + count; });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function aggFillers(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].filler_words;
        } else if (speaker === "all" || !speaker) {
            data = v.filler_words;
        } else return;
        if (!data) return;
        Object.entries(data).forEach(([w, d]) => {
            combined[w] = (combined[w]||0) + d.count;
        });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function aggSuperlatives(videos, speaker) {
    const combined = {};
    videos.forEach(v => {
        let data;
        if (speaker && speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            data = v.by_speaker[speaker].superlatives;
        } else if (speaker === "all" || !speaker) {
            data = v.superlatives;
        } else return;
        if (!data || !data.words) return;
        Object.entries(data.words).forEach(([w, d]) => {
            combined[w] = (combined[w]||0) + d.count;
        });
    });
    return Object.entries(combined).sort((a,b) => b[1]-a[1]);
}

function hasSpeakerData(videos) {
    return videos.some(v => v.has_speaker_data);
}

function render() {
    const container = d3.select("#main-content");
    container.html("");
    const videos = getActiveVideos();
    const sp = currentSpeaker;
    const label = currentVideo !== "all"
        ? DATA.videos[currentVideo]?.title
        : currentYear !== "all" ? `${currentYear} Awards` : "All Years (2011-2025)";
    d3.select("#active-filter-label").text(
        (sp !== "all" ? sp + " - " : "") + label
    );

    if (!videos.length) {
        container.append("div").attr("class","loading").text("No data for this selection.");
        return;
    }

    if (sp !== "all" && !hasSpeakerData(videos)) {
        container.append("div").attr("class","no-speaker-note").html(
            `<strong>Speaker data not yet available.</strong> Run the diarization pipeline (<code>python diarize.py</code>) to enable per-speaker analysis. Showing combined data instead.`
        );
    }

    renderBigNumbers(container, videos, sp);
    renderNarrative(container, videos, sp);
    if (sp === "all" && DATA.has_speaker_data) renderSpeakerComparison(container, videos);
    renderWordCloud(container, videos, sp);
    renderFillerWordsChart(container, videos, sp);
    renderSuperlativeChart(container, videos, sp);
    if (currentVideo === "all") renderVocabularyEvolution(container, sp);
    if (videos.length === 1) renderEnergyTimeline(container, videos[0]);
    renderHarmonyMeter(container, videos);
    renderHotTakes(container, videos, sp);
    renderSentiment(container, videos);
    renderRants(container);
    renderTfidf(container);
    renderMarkovQuotes(container);
    renderCastle(container, videos);
    if (currentVideo === "all") renderRecords(container);
    if (currentVideo === "all") renderFillerEvolution(container, sp);
    renderFooter(container);
}

function renderBigNumbers(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    let totalWords = 0, totalMin = 0, totalFillers = 0, totalSups = 0;

    videos.forEach(v => {
        if (speaker !== "all" && v.by_speaker && v.by_speaker[speaker]) {
            const sp = v.by_speaker[speaker];
            totalWords += sp.vocabulary?.total_words || 0;
            totalMin += (sp.speaking_time_seconds || 0) / 60;
            totalFillers += Object.values(sp.filler_words || {}).reduce((s,f) => s + f.count, 0);
            totalSups += sp.superlatives?.total || 0;
        } else {
            totalWords += v.vocabulary?.total_words || 0;
            totalMin += v.duration_min || 0;
            totalFillers += Object.values(v.filler_words || {}).reduce((s,f) => s + f.count, 0);
            totalSups += v.superlatives?.total || 0;
        }
    });
    const avgWpm = totalMin > 0 ? Math.round(totalWords / totalMin) : 0;

    const nums = section.append("div").attr("class","big-numbers");
    [[fmt(videos.length), "Videos Analyzed"],
     [fmt(totalWords), "Words Spoken"],
     [fmtDec(totalMin / 60), "Hours"],
     [fmt(avgWpm), "Avg Words/Min"],
     [fmt(totalFillers), "Filler Words"],
     [fmt(totalSups), "Superlatives"]
    ].forEach(([num, lbl]) => {
        const card = nums.append("div").attr("class","big-number");
        card.append("div").attr("class","number").text(num);
        card.append("div").attr("class","label").text(lbl);
    });

    // Add tooltip to Videos card if some videos lack transcripts
    if (DATA.total_videos && DATA.total_with_transcripts && DATA.total_videos > DATA.total_with_transcripts) {
        const missing = DATA.total_videos - DATA.total_with_transcripts;
        const missingInfo = DATA.missing_videos || [];
        let tipHtml = `<div class="tt-title">${DATA.total_videos} Total Videos</div>` +
            `<div style="margin-bottom:6px">${missing} had no transcript available:</div>`;
        if (missingInfo.length) {
            tipHtml += missingInfo.map(v =>
                `<div style="padding:2px 0;border-top:1px solid rgba(255,255,255,0.15)">` +
                `<strong>${v.title}</strong> <span style="opacity:0.7">(${v.year || "unknown"})</span></div>`
            ).join("");
        }
        const videoCard = nums.select(".big-number");
        videoCard.style("cursor","help")
            .on("mouseover", (event) => showTooltip(event, tipHtml))
            .on("mouseout", hideTooltip);
    }
}

function renderNarrative(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    let totalWords = 0, totalMin = 0;
    const fillerAgg = {};
    videos.forEach(v => {
        const src = (speaker !== "all" && v.by_speaker?.[speaker]) || v;
        totalWords += src.vocabulary?.total_words || 0;
        totalMin += (src.speaking_time_seconds ? src.speaking_time_seconds/60 : v.duration_min) || 0;
        const fw = src.filler_words || {};
        Object.entries(fw).forEach(([w,d]) => { fillerAgg[w] = (fillerAgg[w]||0) + d.count; });
    });
    const totalFillers = Object.values(fillerAgg).reduce((s,c) => s+c, 0);
    const fillerPct = totalWords > 0 ? (totalFillers / totalWords * 100).toFixed(1) : 0;
    const topFiller = Object.entries(fillerAgg).sort((a,b) => b[1]-a[1])[0];
    const who = speaker !== "all" ? speaker : "Justin and Tyler";
    const novels = Math.round(totalWords / 80000);

    section.append("div").attr("class","narrative").html(
        `Over <strong>${fmt(videos.length)} videos</strong> and ` +
        `<strong>${fmtDec(totalMin)} minutes</strong>, ${who} spoke ` +
        `approximately <strong>${fmt(totalWords)} words</strong> about movies. ` +
        `That's roughly ${novels} novel${novels !== 1 ? 's' : ''}. ` +
        (topFiller ? `Favorite verbal crutch? <span class="highlight">"${topFiller[0]}"</span>, ` +
        `uttered <strong>${fmt(topFiller[1])} times</strong>. ` : '') +
        `About <strong>${fillerPct}%</strong> of everything is filler.`
    );
}

        svg.append("text").attr("x",880).attr("y",35).attr("fill","#fff").attr("font-weight","700")

function renderWordCloud(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Lexical Obsessions");
    header.append("h2").text(speaker !== "all" ? `What ${speaker} Can't Stop Saying` : "What They Can't Stop Talking About");
    header.append("div").attr("class","section-sub").text("Most frequently used words, stop words removed. Size = frequency.");

    const skipWords = new Set(["movie","movies","film","films"]);
    const wordData = aggWordFreq(videos, speaker).filter(d=>!skipWords.has(d[0])).slice(0, 60);
    if (!wordData.length) return;

    const chart = section.append("div").attr("class","chart-container");
    const width = 900, height = 480;
    const svg = chart.append("svg").attr("viewBox",`0 0 ${width} ${height}`).attr("class","word-cloud");

    // VHS tape shell (background shape)
    const vhsG = svg.append("g").attr("class","vhs-shell");
    const pad = 16;
    // Outer shell
    vhsG.append("rect").attr("x",pad).attr("y",pad).attr("width",width-pad*2).attr("height",height-pad*2)
        .attr("rx",12).attr("fill","#1a1a1a").attr("stroke","#333").attr("stroke-width",2);
    // Label area (center rectangle)
    const lx=80, ly=60, lw=width-160, lh=height-120;
    vhsG.append("rect").attr("x",lx).attr("y",ly).attr("width",lw).attr("height",lh)
        .attr("rx",4).attr("fill","#faf7f2").attr("stroke","#999").attr("stroke-width",1);
    // Two reel windows at bottom
    const reelY = height - 50, reelR = 18;
    [width*0.3, width*0.7].forEach(rx => {
        vhsG.append("circle").attr("cx",rx).attr("cy",reelY).attr("r",reelR)
            .attr("fill","#111").attr("stroke","#444").attr("stroke-width",1.5);
        vhsG.append("circle").attr("cx",rx).attr("cy",reelY).attr("r",reelR*0.4)
            .attr("fill","#222").attr("stroke","#555").attr("stroke-width",1);
        // Spokes
        for (let a = 0; a < Math.PI*2; a += Math.PI/3) {
            vhsG.append("line").attr("x1",rx).attr("y1",reelY)
                .attr("x2",rx+reelR*0.85*Math.cos(a)).attr("y2",reelY+reelR*0.85*Math.sin(a))
                .attr("stroke","#444").attr("stroke-width",0.5);
        }
    });
    // Tape window between reels
    vhsG.append("rect").attr("x",width*0.3+reelR+4).attr("y",reelY-8)
        .attr("width",width*0.4-reelR*2-8).attr("height",16).attr("rx",2)
        .attr("fill","#2a1a0a").attr("opacity",0.6);
    // "VHS" label
    vhsG.append("text").attr("x",width-50).attr("y",height-30)
        .attr("font-family","'JetBrains Mono', monospace").attr("font-size","10px")
        .attr("fill","#555").attr("letter-spacing","2px").text("VHS");

    // Place words inside the label area
    const maxCount = wordData[0][1];
    const fontSize = d3.scaleSqrt().domain([wordData[wordData.length-1][1], maxCount]).range([9, 46]);
    const color = d3.scaleOrdinal().range(["#c0392b","#2c3e50","#e67e22","#27ae60","#8e44ad","#2980b9","#d35400"]);
    const cx = lx + lw/2, cy = ly + lh/2;

    wordData.forEach(([word, count], i) => {
        const size = fontSize(count);
        const angle = i * 0.7;
        const radius = Math.sqrt(i) * 22;
        let wx = Math.max(lx+size*1.5, Math.min(lx+lw-size*1.5, cx + radius*Math.cos(angle)));
        let wy = Math.max(ly+size, Math.min(ly+lh-size*0.3, cy + radius*Math.sin(angle)));

        svg.append("text").attr("x",wx).attr("y",wy).attr("text-anchor","middle")
            .attr("font-size",size+"px").attr("font-weight",size>28?700:400)
            .attr("fill",color(i%7)).attr("opacity",0.85).text(word)
            .on("mouseover", function(event) {
                showTooltip(event, `<div class="tt-title">"${word}"</div>Used ${fmt(count)} times`);
                d3.select(this).attr("opacity",1);
            })
            .on("mouseout", function() { hideTooltip(); d3.select(this).attr("opacity",0.85); });
    });
    chart.append("div").attr("class","chart-source").text("Source: YouTube auto-generated transcripts");
}

function renderVocabularyEvolution(container, speaker) {
    if (!DATA.by_year) return;
    const years = Object.values(DATA.by_year)
        .filter(y => currentYear === "all" || y.year == currentYear)
        .sort((a,b) => a.year - b.year);
    if (years.length < 2) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Intellectual Trajectory");
    header.append("h2").text("Are They Getting Smarter?");
    header.append("div").attr("class","section-sub").text("Vocabulary richness (type-token ratio) and words-per-minute over time.");

    const firstTTR = years[0].ttr, lastTTR = years[years.length-1].ttr;
    const trend = lastTTR > firstTTR ? "expanding" : "shrinking";
    section.append("div").attr("class","narrative").html(
        `In ${years[0].year}, vocabulary diversity was <strong>${years[0].ttr}</strong>. ` +
        `By ${years[years.length-1].year}, it was <strong>${years[years.length-1].ttr}</strong>. ` +
        `Their vocabulary is <span class="highlight">${trend}</span>. ` +
        (trend === "shrinking"
            ? "Fewer unique words per total spoken. Either they've found their favorites, or the movies are breaking their brains."
            : "More unique words. The movies are making them more articulate. Or they bought a thesaurus.")
    );

    const chart = section.append("div").attr("class","chart-container");
    const margin = {top:20,right:60,bottom:40,left:60};
    const width = 900-margin.left-margin.right, height = 280-margin.top-margin.bottom;
    const svg = chart.append("svg")
        .attr("viewBox",`0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`)
        .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear().domain(d3.extent(years,d=>d.year)).range([0,width]);
    const y = d3.scaleLinear().domain([d3.min(years,d=>d.ttr)*0.9,d3.max(years,d=>d.ttr)*1.1]).range([height,0]);
    const y2 = d3.scaleLinear().domain([d3.min(years,d=>d.words_per_minute)*0.9,d3.max(years,d=>d.words_per_minute)*1.1]).range([height,0]);

    svg.append("path").datum(years)
        .attr("d",d3.line().x(d=>x(d.year)).y(d=>y(d.ttr)).curve(d3.curveMonotoneX))
        .attr("fill","none").attr("stroke","#c0392b").attr("stroke-width",2.5);
    svg.append("path").datum(years)
        .attr("d",d3.line().x(d=>x(d.year)).y(d=>y2(d.words_per_minute)).curve(d3.curveMonotoneX))
        .attr("fill","none").attr("stroke","#2980b9").attr("stroke-width",2.5).attr("stroke-dasharray","5,3");

    svg.selectAll(".dt").data(years).join("circle")
        .attr("cx",d=>x(d.year)).attr("cy",d=>y(d.ttr)).attr("r",5).attr("fill","#c0392b")
        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>TTR: ${d.ttr}<br>WPM: ${d.words_per_minute}`))
        .on("mouseout",hideTooltip);
    svg.selectAll(".dw").data(years).join("circle")
        .attr("cx",d=>x(d.year)).attr("cy",d=>y2(d.words_per_minute)).attr("r",5).attr("fill","#2980b9")
        .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.year}</div>WPM: ${d.words_per_minute}<br>TTR: ${d.ttr}`))
        .on("mouseout",hideTooltip);

    svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).ticks(years.length).tickFormat(d3.format("d")));
    svg.append("g").call(d3.axisLeft(y).ticks(5)).append("text").attr("fill","#c0392b").attr("y",-10).attr("font-size","11px").text("TTR");
    svg.append("g").attr("transform",`translate(${width},0)`).call(d3.axisRight(y2).ticks(5))
        .append("text").attr("fill","#2980b9").attr("y",-10).attr("font-size","11px").text("WPM");

    const legend = svg.append("g").attr("transform",`translate(${width-200},10)`);
    legend.append("line").attr("x1",0).attr("x2",20).attr("y1",0).attr("y2",0).attr("stroke","#c0392b").attr("stroke-width",2.5);
    legend.append("text").attr("x",25).attr("y",4).attr("font-size","12px").text("Vocabulary Richness (TTR)");
    legend.append("line").attr("x1",0).attr("x2",20).attr("y1",20).attr("y2",20).attr("stroke","#2980b9").attr("stroke-width",2.5).attr("stroke-dasharray","5,3");
    legend.append("text").attr("x",25).attr("y",24).attr("font-size","12px").text("Words Per Minute");
}

    const chart = section.append("div").attr("class","chart-container");

    const width = 900-margin.left-margin.right, height = 260-margin.top-margin.bottom;
    const svg = chart.append("svg")
        .attr("viewBox",`0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`)
        .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

    const x = d3.scaleBand().domain(data.map(d=>d.pct_through+"%")).range([0,width]).padding(0.15);
    const yE = d3.scaleLinear().domain([0,d3.max(data,d=>d.words_per_minute)*1.1]).range([height,0]);

    svg.selectAll("rect").data(data).join("rect")
        .attr("x",d=>x(d.pct_through+"%")).attr("y",d=>yE(d.words_per_minute))
        .attr("width",x.bandwidth()).attr("height",d=>height-yE(d.words_per_minute))
        .attr("fill",d=>{const i=d.superlatives+d.fillers;return i>10?"#c0392b":i>5?"#e67e22":"#2c3e50";})
        .attr("opacity",0.75)
        .on("mouseover",function(event,d){
            let tip = `<div class="tt-title">${d.pct_through}% through</div>WPM: ${d.words_per_minute}<br>Superlatives: ${d.superlatives}<br>Fillers: ${d.fillers}`;
            if (d.wpm_justin) tip += `<br>Justin WPM: ${d.wpm_justin}`;
            if (d.wpm_tyler) tip += `<br>Tyler WPM: ${d.wpm_tyler}`;
            showTooltip(event,tip);d3.select(this).attr("opacity",1);
        })
        .on("mouseout",function(){hideTooltip();d3.select(this).attr("opacity",0.75);});

    svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x));
    svg.append("g").call(d3.axisLeft(yE).ticks(5));
    svg.append("text").attr("transform","rotate(-90)").attr("y",-40).attr("x",-height/2)
        .attr("text-anchor","middle").attr("font-size","12px").attr("fill","#666").text("Words per Minute");
}

function renderHarmonyMeter(container, videos) {
    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Friendship Stress Test");
    header.append("h2").text("The Harmony Index");
    header.append("div").attr("class","section-sub").text("Agreement vs. disagreement markers in conversation.");

    const totalAgree = d3.sum(videos,v=>v.agreement_disagreement?.agreements||0);
    const totalDisagree = d3.sum(videos,v=>v.agreement_disagreement?.disagreements||0);
    const total = totalAgree + totalDisagree;
    if (!total) { section.append("div").attr("class","narrative").text("Not enough opinion data."); return; }

    const ratio = totalDisagree > 0 ? (totalAgree/totalDisagree).toFixed(1) : "Infinite";
    section.append("div").attr("class","narrative").html(
        `For every disagreement, they agree <strong>${ratio} times</strong>. ` +
        `Out of <strong>${fmt(total)}</strong> opinion exchanges, ` +
        `<strong>${fmt(totalAgree)}</strong> agreements, <strong>${fmt(totalDisagree)}</strong> disagreements. ` +
        (parseFloat(ratio) > 3 ? "They're a hive mind with two mouths." :
         parseFloat(ratio) < 1.5 ? "They should see a couples therapist." :
         "Healthy tension. They push back just enough.")
    );

    const chart = section.append("div").attr("class","chart-container");
    const svg = chart.append("svg").attr("viewBox","0 0 900 80");
    const pct = totalAgree / total;
    svg.append("rect").attr("x",20).attr("y",20).attr("width",860*pct).attr("height",40).attr("fill","#27ae60").attr("rx",4);
    svg.append("rect").attr("x",20+860*pct).attr("y",20).attr("width",860*(1-pct)).attr("height",40).attr("fill","#c0392b").attr("rx",4);
    svg.append("text").attr("x",30).attr("y",45).attr("fill","#fff").attr("font-weight","700").attr("font-size","14px").text(`Agree: ${(pct*100).toFixed(0)}%`);
    svg.append("text").attr("x",880).attr("y",45).attr("fill","#fff").attr("font-weight","700").attr("font-size","14px").attr("text-anchor","end").text(`Disagree: ${((1-pct)*100).toFixed(0)}%`);
}

function renderHotTakes(container, videos, speaker) {
    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Controversy Radar");
    header.append("h2").text("Hot Take Hall of Fame");
    header.append("div").attr("class","section-sub").text("Unpopular opinions, overrated/underrated calls, and fighting words.");

    const totalHT = d3.sum(videos,v=>{
        if (speaker !== "all" && v.by_speaker?.[speaker]) return v.by_speaker[speaker].hot_takes?.count || 0;
        return v.hot_takes?.count || 0;
    });
    const avg = videos.length > 0 ? (totalHT/videos.length).toFixed(1) : 0;

    section.append("div").attr("class","narrative").html(
        `<strong>${fmt(totalHT)} hot takes</strong> detected, averaging <strong>${avg} per video</strong>. ` +
        (totalHT > 50 ? "Professional contrarians." : totalHT > 10 ? "Moderate spice level." : "Surprisingly mild.")
    );

    const allTakes = [];
    videos.forEach(v => {
        const src = (speaker !== "all" && v.by_speaker?.[speaker]) || v;
        (src.hot_takes?.instances || []).forEach(ht => {
            allTakes.push({...ht, video: v.title, year: v.year});
        });
    });
    allTakes.slice(0,5).forEach(take => {
        section.append("div").attr("class","pull-quote")
            .html(`"...${take.context}..."<div class="attribution">Detected "${take.marker}" &mdash; ${take.video}</div>`);
    });
}

function renderSentiment(container, videos) {
    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Emotional Intelligence");
    header.append("h2").text("The Emotional Rollercoaster");
    header.append("div").attr("class","section-sub").text("VADER sentiment analysis reveals how they really feel about movies.");

    if (currentVideo !== "all") {
        // Single video: area chart timeline
        const v = DATA.videos[currentVideo];
        if (!v || !v.sentiment) return;
        const s = v.sentiment;

        section.append("div").attr("class","narrative").html(
            `Overall sentiment: <strong>${s.compound > 0 ? "Positive" : s.compound < 0 ? "Negative" : "Neutral"}</strong> (compound: ${s.compound}). ` +
            `Positivity: ${(s.pos*100).toFixed(0)}% | Negativity: ${(s.neg*100).toFixed(0)}% | Neutral: ${(s.neu*100).toFixed(0)}%`
        );

        // Sentiment timeline area chart
        const timeline = s.timeline || [];
        if (timeline.length > 1) {
            const chart = section.append("div").attr("class","chart-container");
            const margin = {top:20,right:30,bottom:40,left:50};
            const width = 900-margin.left-margin.right, height = 220-margin.top-margin.bottom;
            const svg = chart.append("svg")
                .attr("viewBox",`0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`)
                .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear().domain([0,100]).range([0,width]);
            const y = d3.scaleLinear().domain([-1,1]).range([height,0]);

            // Zero line
            svg.append("line").attr("x1",0).attr("x2",width).attr("y1",y(0)).attr("y2",y(0))
                .attr("stroke","#999").attr("stroke-dasharray","4,4");

            // Positive area
            svg.append("path").datum(timeline)
                .attr("d",d3.area().x(d=>x(d.pct_through)).y0(y(0)).y1(d=>y(Math.max(d.compound,0))).curve(d3.curveMonotoneX))
                .attr("fill","#27ae60").attr("opacity",0.3);
            // Negative area
            svg.append("path").datum(timeline)
                .attr("d",d3.area().x(d=>x(d.pct_through)).y0(y(0)).y1(d=>y(Math.min(d.compound,0))).curve(d3.curveMonotoneX))
                .attr("fill","#c0392b").attr("opacity",0.3);
            // Line
            svg.append("path").datum(timeline)
                .attr("d",d3.line().x(d=>x(d.pct_through)).y(d=>y(d.compound)).curve(d3.curveMonotoneX))
                .attr("fill","none").attr("stroke","var(--accent2)").attr("stroke-width",2);
            // Dots
            svg.selectAll(".sd").data(timeline).join("circle")
                .attr("cx",d=>x(d.pct_through)).attr("cy",d=>y(d.compound)).attr("r",4).attr("fill","var(--accent2)")
                .on("mouseover",(event,d)=>showTooltip(event,`<div class="tt-title">${d.pct_through}% through</div>Sentiment: ${d.compound}`))
                .on("mouseout",hideTooltip);

            svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).tickFormat(d=>d+"%"));
            svg.append("g").call(d3.axisLeft(y).ticks(5));
            svg.append("text").attr("x",width/2).attr("y",height+35).attr("text-anchor","middle").attr("font-size","12px").attr("fill","#666").text("% Through Video");
        }

        // Quote callouts
        const callouts = section.append("div").attr("class","sentiment-callout");
        if (s.most_positive) {
            const card = callouts.append("div").attr("class","sc-card positive");
            card.append("div").attr("class","sc-label").text("Most Positive Moment");
            card.append("div").attr("class","sc-quote").text(`"${s.most_positive.text}"`);
            const mins = Math.floor(s.most_positive.start/60), secs = Math.floor(s.most_positive.start%60);
            card.append("div").attr("class","sc-meta").text(`Score: ${s.most_positive.compound} | ${mins}:${String(secs).padStart(2,'0')}`);
        }
        if (s.most_negative) {
            const card = callouts.append("div").attr("class","sc-card negative");
            card.append("div").attr("class","sc-label").text("Most Negative Moment");
            card.append("div").attr("class","sc-quote").text(`"${s.most_negative.text}"`);
            const mins = Math.floor(s.most_negative.start/60), secs = Math.floor(s.most_negative.start%60);
            card.append("div").attr("class","sc-meta").text(`Score: ${s.most_negative.compound} | ${mins}:${String(secs).padStart(2,'0')}`);
        }
    } else {
        // Year view: line chart of avg sentiment by year
        const sentByYear = DATA.sentiment_by_year;
        if (!sentByYear || !Object.keys(sentByYear).length) {
            section.append("div").attr("class","narrative").text("No sentiment data available.");
            return;
        }
        const years = Object.entries(sentByYear).map(([y,d])=>({year:+y,...d})).sort((a,b)=>a.year-b.year);

        // Narrative
        const avgAll = d3.mean(years, d=>d.avg_compound);
        section.append("div").attr("class","narrative").html(
            `Average sentiment across all years: <strong>${avgAll.toFixed(3)}</strong>. ` +
            (avgAll > 0.1 ? "Overall positive — they actually like movies!" :
             avgAll < -0.1 ? "Overall negative — maybe they should watch different movies." :
             "Hovering near neutral — the mark of true critics (or extreme ambivalence).")
        );

        if (years.length > 1) {
            const chart = section.append("div").attr("class","chart-container");
            chart.append("div").attr("class","chart-title").text("Average Sentiment by Year");
            const margin = {top:20,right:30,bottom:40,left:50};
            const width = 900-margin.left-margin.right, height = 260-margin.top-margin.bottom;
            const svg = chart.append("svg")
                .attr("viewBox",`0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`)
                .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear().domain(d3.extent(years,d=>d.year)).range([0,width]);
            const yMax = Math.max(0.5, d3.max(years,d=>Math.abs(d.avg_compound))*1.3);
            const y = d3.scaleLinear().domain([-yMax,yMax]).range([height,0]);

            // Zero line
            svg.append("line").attr("x1",0).attr("x2",width).attr("y1",y(0)).attr("y2",y(0))
                .attr("stroke","#999").attr("stroke-dasharray","4,4");

            // Area fills
            svg.append("path").datum(years)
                .attr("d",d3.area().x(d=>x(d.year)).y0(y(0)).y1(d=>y(Math.max(d.avg_compound,0))).curve(d3.curveMonotoneX))
                .attr("fill","#27ae60").attr("opacity",0.2);
            svg.append("path").datum(years)
                .attr("d",d3.area().x(d=>x(d.year)).y0(y(0)).y1(d=>y(Math.min(d.avg_compound,0))).curve(d3.curveMonotoneX))
                .attr("fill","#c0392b").attr("opacity",0.2);

            svg.append("path").datum(years)
                .attr("d",d3.line().x(d=>x(d.year)).y(d=>y(d.avg_compound)).curve(d3.curveMonotoneX))
                .attr("fill","none").attr("stroke","var(--accent2)").attr("stroke-width",2.5);

            svg.selectAll(".sd").data(years).join("circle")
                .attr("cx",d=>x(d.year)).attr("cy",d=>y(d.avg_compound)).attr("r",5)
                .attr("fill",d=>d.avg_compound>=0?"#27ae60":"#c0392b")
                .on("mouseover",(event,d)=>showTooltip(event,
                    `<div class="tt-title">${d.year}</div>Avg sentiment: ${d.avg_compound}<br>` +
                    `Angriest: ${d.angriest_video?.title||"N/A"}<br>Most wholesome: ${d.most_wholesome_video?.title||"N/A"}`))
                .on("mouseout",hideTooltip);

            svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).ticks(years.length).tickFormat(d3.format("d")));
            svg.append("g").call(d3.axisLeft(y).ticks(5));
        }

        // All-time records
        const angriest = DATA.angriest_video;
        const wholesome = DATA.most_wholesome_video;
        if (angriest || wholesome) {
            const callouts = section.append("div").attr("class","sentiment-callout");
            if (wholesome) {
                const card = callouts.append("div").attr("class","sc-card positive");
                card.append("div").attr("class","sc-label").text("Most Wholesome Video Ever");
                card.append("div").attr("class","sc-quote").text(wholesome.title);
                card.append("div").attr("class","sc-meta").text(`Compound: ${wholesome.compound} (${wholesome.year})`);
            }
            if (angriest) {
                const card = callouts.append("div").attr("class","sc-card negative");
                card.append("div").attr("class","sc-label").text("Angriest Video Ever");
                card.append("div").attr("class","sc-quote").text(angriest.title);
                card.append("div").attr("class","sc-meta").text(`Compound: ${angriest.compound} (${angriest.year})`);
            }
        }
    }
}

        const mins = Math.floor(r.start/60), secs = Math.floor(r.start%60);
        body.append("div").attr("class","rant-meta").text(
            `${r.year} | ${mins}:${String(secs).padStart(2,'0')} | Score: ${r.score} | ${r.wpm} WPM | Neg: ${(r.neg*100).toFixed(0)}%`
        );
        body.append("div").attr("class","rant-quote").text(`"${r.text_preview}${r.text_preview.length>=200?"...":""}"`);
        const bar = entry.append("div");
        const barW = bar.append("div").attr("class","rant-score-bar");
        barW.append("div").attr("class","fill").style("width", `${(r.score/maxScore*100).toFixed(0)}%`);
    });

    // Radar chart for #1 rant
    if (rants.length > 0) {
        const top = rants[0];
        const chart = section.append("div").attr("class","chart-container");
        chart.append("div").attr("class","chart-title").text(`#1 Rant Breakdown: "${top.title}"`);
        const size = 260, cx = 450, cy = 150, radius = 100;
        const svg = chart.append("svg").attr("viewBox","0 0 900 300");
        const metrics = [
            {label:"WPM", value:top.wpm, max:300},
            {label:"Negativity", value:top.neg*100, max:100},
            {label:"Superlatives", value:top.sup_density, max:20},
            {label:"Fillers", value:top.filler_density, max:20}
        ];
        const angleSlice = Math.PI*2/metrics.length;
        // Grid
        [0.25,0.5,0.75,1].forEach(level => {
            const points = metrics.map((_,i)=>{
                const angle = i*angleSlice - Math.PI/2;
                return `${cx+radius*level*Math.cos(angle)},${cy+radius*level*Math.sin(angle)}`;
            }).join(" ");
            svg.append("polygon").attr("points",points).attr("fill","none").attr("stroke","#ddd").attr("stroke-width",0.5);
        });
        // Axes
        metrics.forEach((m,i)=>{
            const angle = i*angleSlice - Math.PI/2;
            svg.append("line").attr("x1",cx).attr("y1",cy)
                .attr("x2",cx+radius*Math.cos(angle)).attr("y2",cy+radius*Math.sin(angle))
                .attr("stroke","#ddd");
            svg.append("text")
                .attr("x",cx+(radius+20)*Math.cos(angle)).attr("y",cy+(radius+20)*Math.sin(angle))
                .attr("text-anchor","middle").attr("font-size","12px").attr("fill","#666")
                .text(m.label);
        });
        // Data polygon
        const dataPoints = metrics.map((m,i)=>{
            const angle = i*angleSlice - Math.PI/2;
            const val = Math.min(m.value/m.max, 1);
            return `${cx+radius*val*Math.cos(angle)},${cy+radius*val*Math.sin(angle)}`;
        }).join(" ");
        svg.append("polygon").attr("points",dataPoints).attr("fill","var(--accent)").attr("opacity",0.3).attr("stroke","var(--accent)").attr("stroke-width",2);
    }
}

function renderTfidf(container) {
    if (currentVideo !== "all" || !DATA.tfidf) return;
    const tfidf = DATA.tfidf;
    const sigs = tfidf.year_signatures || {};
    const trends = tfidf.word_trends || {};

    if (!Object.keys(sigs).length) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Linguistic Archaeology");
    header.append("h2").text("The Zeitgeist Machine");
    header.append("div").attr("class","section-sub").text("What words defined each year? TF-IDF finds the words that made each year unique.");

    section.append("div").attr("class","narrative").html(
        "<strong>How it works:</strong> TF-IDF (Term Frequency &ndash; Inverse Document Frequency) is a way to find " +
        "words that are <em>unusually common</em> in one year compared to all others. A high score doesn't just mean " +
        "they said a word a lot &mdash; it means they said it a lot <em>that year specifically</em>. Think of it as: " +
        "\"If someone only listened to one year, which words would stand out?\" Each word below is sized by its score."
    );

    // Year signatures
    const sigBox = section.append("div").style("margin","24px 0");
    const yearFilter = currentYear !== "all" ? [currentYear] : null;
    Object.entries(sigs).sort((a,b)=>a[0]-b[0]).forEach(([year, words]) => {
        if (yearFilter && !yearFilter.includes(year)) return;
        if (!words.length) return;
        const maxScore = words[0].score;
        const row = sigBox.append("div").attr("class","tfidf-year-row");
        row.append("div").attr("class","tfidf-year").text(year);
        const wordsDiv = row.append("div").attr("class","tfidf-words");
        words.forEach(w => {
            const scale = 0.7 + (w.score / maxScore) * 0.6;
            wordsDiv.append("span").attr("class","tfidf-word-tag")
                .style("font-size", `${Math.round(12*scale)}px`)
                .style("opacity", 0.5 + (w.score/maxScore)*0.5)
                .text(w.word)
                .on("mouseover",(event)=>showTooltip(event,`<div class="tt-title">${w.word}</div>TF-IDF: ${w.score}`))
                .on("mouseout",hideTooltip);
        });
    });

    // Word trends multi-line chart
    const trendWords = Object.keys(trends);
    if (trendWords.length > 0) {
        const chart = section.append("div").attr("class","chart-container");
        chart.append("div").attr("class","chart-title").text("Tracked Words Over Time");
        const margin = {top:20,right:120,bottom:40,left:50};
        const width = 900-margin.left-margin.right, height = 260-margin.top-margin.bottom;
        const svg = chart.append("svg")
            .attr("viewBox",`0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`)
            .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

        const allYears = [...new Set(trendWords.flatMap(w=>Object.keys(trends[w]).map(Number)))].sort();
        const allVals = trendWords.flatMap(w=>Object.values(trends[w]));
        const x = d3.scaleLinear().domain(d3.extent(allYears)).range([0,width]);
        const y = d3.scaleLinear().domain([0,d3.max(allVals)*1.1]).range([height,0]);
        const color = d3.scaleOrdinal(d3.schemeTableau10);

        const activeWords = new Set(trendWords);

        trendWords.forEach((word,wi) => {
            const pts = Object.entries(trends[word]).map(([yr,val])=>({year:+yr,val})).sort((a,b)=>a.year-b.year);
            svg.append("path").datum(pts)
                .attr("class",`trend-line-${wi}`)
                .attr("d",d3.line().x(d=>x(d.year)).y(d=>y(d.val)).curve(d3.curveMonotoneX))
                .attr("fill","none").attr("stroke",color(wi)).attr("stroke-width",2);
            svg.selectAll(`.td-${wi}`).data(pts).join("circle")
                .attr("class",`trend-dot-${wi}`)
                .attr("cx",d=>x(d.year)).attr("cy",d=>y(d.val)).attr("r",3).attr("fill",color(wi));
        });

        svg.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).ticks(allYears.length).tickFormat(d3.format("d")));
        svg.append("g").call(d3.axisLeft(y).ticks(5));

        // Legend
        const legend = svg.append("g").attr("transform",`translate(${width+10},0)`);
        trendWords.forEach((word,i) => {
            const g = legend.append("g").attr("transform",`translate(0,${i*20})`).style("cursor","pointer");
            g.append("rect").attr("width",12).attr("height",12).attr("fill",color(i));
            g.append("text").attr("x",16).attr("y",10).attr("font-size","11px").text(word);
        });
    }
}

function renderMarkovQuotes(container) {
    if (currentVideo !== "all" || !DATA.markov_quotes || !DATA.markov_quotes.length) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("Machine Learning Cinema");
    header.append("h2").text("The AI Movie Critic");

    const isLLM = DATA.quote_source === "gemini";
    if (isLLM) {
        header.append("div").attr("class","section-sub").text("We fed Justin & Tyler's transcripts to an AI and asked it to write new quotes in their style. These are 100% fake.");
    } else {
        header.append("div").attr("class","section-sub").text("Generated by a Markov chain trained on every word they've ever said. These quotes are 100% fake.");
        section.append("div").attr("class","narrative").html(
            "<strong>How it works:</strong> A Markov chain looks at every pair of consecutive words in the transcripts, " +
            "then learns: \"After the words <em>this movie</em>, what word usually comes next?\" It builds a giant map of these " +
            "patterns, then generates new sentences by following the chain &mdash; always picking the next word based on " +
            "what the previous two words were. The result sounds <em>vaguely</em> like Justin and Tyler, but often veers " +
            "into beautiful nonsense."
        );
    }

    let quoteIdx = 0;
    const quotes = DATA.markov_quotes;

    const card = section.append("div").attr("class","markov-card");
    const quoteEl = card.append("div").attr("class","markov-quote").text(`"${quotes[0]}"`);
    const counter = card.append("div").style("font-size","12px").style("color","var(--muted)")
        .style("margin-top","8px").style("font-family","JetBrains Mono, monospace")
        .text(`1 / ${quotes.length}`);

    card.append("button").attr("class","markov-btn").text("Generate Another")
        .on("click", () => {
            quoteIdx = (quoteIdx + 1) % quotes.length;
            quoteEl.style("opacity",0);
            setTimeout(() => {
                quoteEl.text(`"${quotes[quoteIdx]}"`).style("opacity",1);
                counter.text(`${quoteIdx+1} / ${quotes.length}`);
            }, 300);
        });
}

function renderCastle(container, videos) {
    // Aggregate Castle mentions across selected videos
    let totalMentions = 0, awardMentions = 0, movieMentions = 0, rabbitMentions = 0;
    const allContexts = [];
    const byYear = {};

    videos.forEach(v => {
        const c = v.castle;
        if (!c) return;
        totalMentions += c.total_mentions || 0;
        awardMentions += c.castle_award_mentions || 0;
        movieMentions += c.movie_castle_mentions || 0;
        rabbitMentions += c.rabbit_mentions || 0;
        (c.contexts || []).forEach(ctx => {
            allContexts.push({...ctx, video: v.title, year: v.year});
        });
    });

    // Also pull from global castle stats if showing all videos
    const globalCastle = DATA.castle || {};
    if (currentVideo === "all" && currentYear === "all") {
        // Use global stats which cover all videos (including those still loading)
        if (globalCastle.total_mentions > totalMentions) {
            totalMentions = globalCastle.total_mentions;
            awardMentions = globalCastle.castle_award_mentions || awardMentions;
        }
    }

    if (totalMentions === 0 && !globalCastle.total_mentions) return;

    const section = container.append("div").attr("class","section");
    const header = section.append("div").attr("class","section-header");
    header.append("div").attr("class","section-kicker").text("The Unofficial Mascot");
    header.append("h2").text("Castle the Rabbit: A Star Is Born");
    header.append("div").attr("class","section-sub").text("Tyler's rabbit, named after Frank Castle (The Punisher). Yes, really. A rabbit named after a vigilante.");

    // Castle hero section
    const castleBox = section.append("div").attr("class","castle-section");
    const castleHeader = castleBox.append("div").attr("class","castle-header");

    // Image placeholder (will be replaced when image is provided)
    const imgEl = castleHeader.append("img")
        .attr("class","castle-img")
        .attr("id","castle-img")
        .attr("src","castle.jpg")
        .attr("alt","Castle the Rabbit")
        .on("error", function() {
            // If image doesn't exist, show placeholder
            d3.select(this).remove();
            castleHeader.insert("div", ":first-child")
                .attr("class","castle-img-placeholder")
                .text("C");
        });

    const castleText = castleHeader.append("div");
    castleText.append("div").style("font-family","'Playfair Display', serif")
        .style("font-size","22px").style("font-weight","700")
        .text("Castle");
    castleText.append("div").style("font-size","14px").style("color","var(--muted)")
        .style("margin-top","4px")
        .html('Species: Rabbit | Namesake: Frank Castle (The Punisher) | Role: Tyler\'s Co-Host & Moral Support');

    // Commentary
    const mentionRate = videos.length > 0 ? (totalMentions / videos.length).toFixed(1) : 0;
    const commentary = totalMentions > 20
        ? `Castle has achieved something most human actors never will: being mentioned <strong>${fmt(totalMentions)} times</strong> across a movie awards show without ever appearing on screen (as far as we know). At <strong>${mentionRate} mentions per video</strong>, Castle has more screen presence than some of the movies being reviewed. The show has even created a <strong>"Castle Award"</strong> in his honor, referenced <strong>${fmt(awardMentions)} times</strong>. We're starting to think this isn't a movie awards show at all &mdash; it's a rabbit fan channel that occasionally discusses cinema.`
        : totalMentions > 5
        ? `Castle has been name-dropped <strong>${fmt(totalMentions)} times</strong>, averaging <strong>${mentionRate} per video</strong>. For a rabbit who has never directed, produced, or starred in a single film, that's a remarkable level of industry relevance. They even created a <strong>"Castle Award"</strong> category &mdash; an accolade most Hollywood executives would kill for.`
        : totalMentions > 0
        ? `Castle has made <strong>${fmt(totalMentions)} cameo${totalMentions > 1 ? 's' : ''}</strong> in the transcript. Not bad for someone who spends most of his time eating hay. Every journey starts with a single hop.`
        : `Castle's presence is felt even when not spoken. The rabbit watches. The rabbit waits.`;

    castleBox.append("div").attr("class","narrative").style("margin-top","16px").html(commentary);

    // Stats grid
    const stats = castleBox.append("div").attr("class","castle-stats-grid");
    [[fmt(totalMentions), "Total Mentions"],
     [fmt(awardMentions), "Castle Award Refs"],
     [mentionRate, "Per Video Avg"]
    ].forEach(([num, lbl]) => {
        const s = stats.append("div").attr("class","castle-stat");
        s.append("div").attr("class","cs-number").text(num);
        s.append("div").attr("class","cs-label").text(lbl);
    });

    // Castle mentions by year chart (if aggregate view)
    const yearData = globalCastle.by_year || byYear;
    const yearEntries = Object.entries(yearData).filter(([,v]) => v > 0).sort((a,b) => a[0]-b[0]);
    if (yearEntries.length > 1 && currentVideo === "all") {
        const chart = castleBox.append("div").style("margin-top","20px")
            .style("background","var(--card-bg)").style("padding","16px").style("border","1px solid var(--border)");
        chart.append("div").style("font-family","'Playfair Display', serif")
            .style("font-size","16px").style("font-weight","700").style("margin-bottom","12px")
            .text("Castle's Rising Influence");

        const margin = {top:10,right:20,bottom:30,left:40};
        const w = 840-margin.left-margin.right, h = 160-margin.top-margin.bottom;
        const svg = chart.append("svg")
            .attr("viewBox",`0 0 ${w+margin.left+margin.right} ${h+margin.top+margin.bottom}`)
            .append("g").attr("transform",`translate(${margin.left},${margin.top})`);

        const x = d3.scaleBand().domain(yearEntries.map(d=>d[0])).range([0,w]).padding(0.3);
        const y = d3.scaleLinear().domain([0,d3.max(yearEntries,d=>d[1])*1.2]).range([h,0]);

        svg.selectAll("rect").data(yearEntries).join("rect")
            .attr("x",d=>x(d[0])).attr("y",d=>y(d[1])).attr("width",x.bandwidth()).attr("height",d=>h-y(d[1]))
            .attr("fill","var(--accent2)").attr("opacity",0.8)
            .on("mouseover",function(event,d){showTooltip(event,`<div class="tt-title">${d[0]}</div>${d[1]} Castle mentions`);d3.select(this).attr("opacity",1);})
            .on("mouseout",function(){hideTooltip();d3.select(this).attr("opacity",0.8);});

        svg.selectAll(".bar-label").data(yearEntries).join("text")
            .attr("x",d=>x(d[0])+x.bandwidth()/2).attr("y",d=>y(d[1])-4)
            .attr("text-anchor","middle").attr("font-size","12px").attr("font-weight","600")
            .attr("fill","var(--accent2)").text(d=>d[1]);

        svg.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x)).select(".domain").remove();
    }

    // Show actual transcript quotes
    if (allContexts.length > 0) {
        const quotes = castleBox.append("div").attr("class","castle-quotes");
        quotes.append("div").style("font-family","'JetBrains Mono', monospace")
            .style("font-size","11px").style("text-transform","uppercase")
            .style("letter-spacing","1.5px").style("color","var(--muted)")
            .style("margin-bottom","8px").text("Actual things said about/near Castle");
        allContexts.slice(0, 6).forEach(ctx => {
            const q = quotes.append("div").attr("class","castle-quote");
            const mins = Math.floor(ctx.time / 60);
            const secs = Math.floor(ctx.time % 60);
            q.html(`"${ctx.text}" <span class="cq-time">&mdash; ${ctx.video.slice(0,50)}, ${mins}:${String(secs).padStart(2,'0')}</span>`);
        });
    }

    // Castle Predictor - "What Summons the Rabbit"
    const predictor = DATA.castle_predictor;
    if (predictor && predictor.coefficients && predictor.coefficients.length && currentVideo === "all") {
        const predBox = section.append("div").style("margin-top","32px");
        predBox.append("div").style("font-family","'Playfair Display', serif")
            .style("font-size","20px").style("font-weight","700").style("margin-bottom","4px")
            .text("What Summons the Rabbit?");
        predBox.append("div").style("font-size","13px").style("color","var(--muted)").style("margin-bottom","16px")
            .text(`Logistic regression trained on ${predictor.n_total} videos (${predictor.n_positive} with Castle mentions). Accuracy: ${(predictor.accuracy*100).toFixed(0)}%`);

        // Coefficient bar chart
        const coeffs = predictor.coefficients;
        const maxCoeff = d3.max(coeffs, d=>Math.abs(d.coefficient));
        const coeffBox = predBox.append("div").style("background","var(--card-bg)").style("padding","16px").style("border","1px solid var(--border)");

        coeffs.forEach(c => {
            const row = coeffBox.append("div").attr("class","predictor-coeff-bar");
            row.append("div").attr("class","pcb-label").text(c.feature);
            const bar = row.append("div").attr("class","pcb-bar");
            const pct = Math.abs(c.coefficient) / maxCoeff * 50;
            const fill = bar.append("div").attr("class","pcb-fill");
            if (c.coefficient >= 0) {
                fill.style("left","50%").style("width",pct+"%").style("background","#27ae60");
            } else {
                fill.style("left",(50-pct)+"%").style("width",pct+"%").style("background","#c0392b");
            }
        });

        // Legend
        const legDiv = coeffBox.append("div").style("display","flex").style("gap","20px").style("margin-top","8px").style("font-size","11px").style("color","var(--muted)");
        legDiv.append("div").html('<span style="color:#c0392b">&#9664;</span> Repels Castle');
        legDiv.append("div").html('<span style="color:#27ae60">&#9654;</span> Summons Castle');

        // Snarky narrative
        const topPos = coeffs.filter(c=>c.coefficient>0).sort((a,b)=>b.coefficient-a.coefficient)[0];
        const topNeg = coeffs.filter(c=>c.coefficient<0).sort((a,b)=>a.coefficient-b.coefficient)[0];
        if (topPos || topNeg) {
            let narrative = "According to our highly scientific model, ";
            if (topPos) narrative += `<strong>${topPos.feature}</strong> is most likely to summon Castle`;
            if (topPos && topNeg) narrative += ", while ";
            if (topNeg) narrative += `<strong>${topNeg.feature}</strong> actively repels him`;
            narrative += ". We take no responsibility for the implications of training a machine learning model on a rabbit's viewing preferences.";
            predBox.append("div").attr("class","narrative").style("margin-top","12px").html(narrative);
        }
    }
}

    section.append("div").attr("class","narrative").html(

    section.append("div").style("font-size","12px").style("color","#999")
